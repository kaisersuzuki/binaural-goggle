<h1>Binaural Beat + LED Goggle Controller</h1>
<div class="subtitle">dsPIC30F4013 · AD5220 · NTE74HC14 · NTE941M · MAX603 — schematic rev 0.1</div>

<svg viewBox="0 0 1280 900" width="1280" height="900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">

  </defs>

  <!-- Background grid -->
  <rect width="1280" height="900" fill="url(#grid)"/>

  <!-- ═══════════════════════════════════════════════════════
       RAILS (power and ground lines)
  ═══════════════════════════════════════════════════════ -->
  <!-- 3.3V rail (top horizontal) -->
  <line x1="60" y1="40" x2="1220" y2="40" stroke="#8a6a2a" stroke-width="2" stroke-dasharray="8,3"/>
  <text x="65" y="35" font-size="9" fill="#8a6a2a" font-family="Courier New">+3.3V</text>
  <text x="600" y="35" font-size="9" fill="#8a6a2a" font-family="Courier New">+3.3V RAIL</text>

  <!-- 5V rail (second horizontal) -->
  <line x1="60" y1="58" x2="1220" y2="58" stroke="#a07030" stroke-width="2" stroke-dasharray="8,3"/>
  <text x="65" y="53" font-size="9" fill="#a07030" font-family="Courier New">+5V</text>

  <!-- GND rail (bottom horizontal) -->
  <line x1="60" y1="870" x2="1220" y2="870" stroke="#2a4a2a" stroke-width="2"/>
  <text x="65" y="882" font-size="9" fill="#3a6a3a" font-family="Courier New">GND</text>
  <text x="600" y="882" font-size="9" fill="#3a6a3a" font-family="Courier New">GND RAIL</text>

  <!-- ═══════════════════════════════════════════════════════
       BLOCK 1: POWER SUPPLY (MAX603 LDO)
  ═══════════════════════════════════════════════════════ -->
  <rect x="40" y="80" width="160" height="200" rx="2" fill="#0a1a0a" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="120" y="97" font-size="9" fill="#7ab87a" text-anchor="middle" font-family="Courier New" letter-spacing="1">POWER</text>
  <line x1="40" y1="102" x2="200" y2="102" stroke="#2a4a2a" stroke-width="0.5"/>

  <!-- Battery symbol -->
  <text x="55" y="125" font-size="8" fill="#556655" font-family="Courier New">9V BATT</text>
  <line x1="55" y1="130" x2="75" y2="130" stroke="#6a8a6a" stroke-width="1.5"/>
  <line x1="60" y1="124" x2="60" y2="136" stroke="#6a8a6a" stroke-width="2"/>
  <line x1="70" y1="127" x2="70" y2="133" stroke="#6a8a6a" stroke-width="1.5"/>
  <line x1="75" y1="130" x2="90" y2="130" stroke="#6a8a6a" stroke-width="1.5"/>
  <text x="92" y="133" font-size="8" fill="#556655" font-family="Courier New">+</text>

  <rect x="55" y="148" width="90" height="36" rx="2" fill="#111e11" stroke="#3a6a3a" stroke-width="1"/>
  <text x="100" y="162" font-size="8" fill="#7ab87a" text-anchor="middle" font-family="Courier New">MAX603</text>
  <text x="100" y="173" font-size="7" fill="#556655" text-anchor="middle" font-family="Courier New">3.3V / 500mA</text>

  <text x="55" y="218" font-size="7" fill="#445544" font-family="Courier New">C2 10µF</text>
  <text x="55" y="231" font-size="7" fill="#445544" font-family="Courier New">(bypass caps)</text>

  <line x1="100" y1="184" x2="100" y2="250" stroke="#2a4a2a" stroke-width="1.5"/>
  <line x1="100" y1="250" x2="100" y2="870" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- MAX603 5V (second LDO for LEDs + op-amp) -->
  <rect x="55" y="248" width="90" height="36" rx="2" fill="#111e11" stroke="#3a6a3a" stroke-width="1"/>
  <text x="100" y="262" font-size="8" fill="#7ab87a" text-anchor="middle" font-family="Courier New">MAX603</text>
  <text x="100" y="273" font-size="7" fill="#556655" text-anchor="middle" font-family="Courier New">5.0V (SET pin)</text>
  <line x1="145" y1="266" x2="200" y2="266" stroke="#a07030" stroke-width="1.5"/>
  <line x1="200" y1="266" x2="200" y2="58" stroke="#a07030" stroke-width="1.5"/>
  <text x="152" y="263" font-size="7" fill="#a07030" font-family="Courier New">5V</text>

  <text x="100" y="319" font-size="8" fill="#6a9a6a" text-anchor="middle" font-family="Courier New">MAX8212</text>
  <text x="100" y="330" font-size="7" fill="#445544" text-anchor="middle" font-family="Courier New">BATT MONITOR</text>
  <text x="55" y="350" font-size="7" fill="#334433" font-family="Courier New">→ GPIO warn pin</text>

  <!-- ═══════════════════════════════════════════════════════

  ═══════════════════════════════════════════════════════ -->
  <rect x="380" y="90" width="280" height="680" rx="3" fill="#081408" stroke="#3a7a3a" stroke-width="2"/>
  <text x="520" y="110" font-size="10" fill="#7ab87a" text-anchor="middle" font-family="Courier New" letter-spacing="2">dsPIC30F4013</text>

  <text x="520" y="131" font-size="8" fill="#3a6a3a" text-anchor="middle" font-family="Courier New">40-DIP · 20MHz Fcy · 48KB Flash</text>

  <!-- PIN LABELS — Left side of dsPIC (inputs/power) -->
  <!-- VDD -->
  <line x1="380" y1="160" x2="340" y2="160" stroke="#8a6a2a" stroke-width="1.5"/>
  <text x="335" y="163" font-size="8" fill="#8a6a2a" text-anchor="end" font-family="Courier New">VDD(3.3V)</text>
  <circle cx="340" cy="160" r="2.5" fill="#8a6a2a"/>
  <!-- Connect VDD to 3.3V rail -->
  <line x1="340" y1="160" x2="340" y2="40" stroke="#8a6a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- VSS/GND -->
  <line x1="380" y1="180" x2="340" y2="180" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="335" y="183" font-size="8" fill="#3a6a3a" text-anchor="end" font-family="Courier New">VSS(GND)</text>
  <circle cx="340" cy="180" r="2.5" fill="#3a6a3a"/>
  <line x1="340" y1="180" x2="340" y2="870" stroke="#2a4a2a" stroke-width="1" stroke-dasharray="4,3"/>

  <!-- MCLR -->
  <line x1="380" y1="200" x2="340" y2="200" stroke="#4a6a4a" stroke-width="1.5"/>
  <text x="335" y="203" font-size="8" fill="#4a6a4a" text-anchor="end" font-family="Courier New">/MCLR</text>
  <text x="260" y="203" font-size="7" fill="#334433" font-family="Courier New">10kΩ → 3.3V</text>

  <!-- OSC1/OSC2 -->
  <line x1="380" y1="220" x2="340" y2="220" stroke="#5a7a5a" stroke-width="1.5"/>
  <text x="335" y="223" font-size="8" fill="#5a7a5a" text-anchor="end" font-family="Courier New">OSC1</text>
  <line x1="380" y1="238" x2="340" y2="238" stroke="#5a7a5a" stroke-width="1.5"/>
  <text x="335" y="241" font-size="8" fill="#5a7a5a" text-anchor="end" font-family="Courier New">OSC2</text>
  <!-- Crystal symbol -->
  <rect x="290" y="215" width="12" height="28" rx="0" fill="#0a180a" stroke="#5a7a5a" stroke-width="1"/>
  <line x1="286" y1="225" x2="290" y2="225" stroke="#5a7a5a" stroke-width="1"/>
  <line x1="286" y1="233" x2="290" y2="233" stroke="#5a7a5a" stroke-width="1"/>
  <text x="278" y="222" font-size="7" fill="#3a5a3a" text-anchor="middle" font-family="Courier New">10</text>
  <text x="278" y="232" font-size="7" fill="#3a5a3a" text-anchor="middle" font-family="Courier New">MHz</text>

  <!-- PIN LABELS — Right side of dsPIC (outputs) -->
  <!-- OC1 — PWM Left Audio -->
  <line x1="660" y1="160" x2="700" y2="160" stroke="#4a9a6a" stroke-width="2"/>
  <text x="665" y="155" font-size="8" fill="#4a9a6a" font-family="Courier New">OC1/RD0</text>
  <text x="665" y="167" font-size="7" fill="#2a5a3a" font-family="Courier New">PWM-L ←</text>

  <!-- OC2 — PWM Right Audio -->
  <line x1="660" y1="188" x2="700" y2="188" stroke="#4a9a6a" stroke-width="2"/>
  <text x="665" y="183" font-size="8" fill="#4a9a6a" font-family="Courier New">OC2/RD1</text>
  <text x="665" y="195" font-size="7" fill="#2a5a3a" font-family="Courier New">PWM-R ←</text>

  <!-- SPI (SCK, SDO for AD5220) -->
  <line x1="660" y1="240" x2="700" y2="240" stroke="#6a8a9a" stroke-width="1.5"/>
  <text x="665" y="237" font-size="8" fill="#6a8a9a" font-family="Courier New">SCK1/RF6</text>
  <line x1="660" y1="258" x2="700" y2="258" stroke="#6a8a9a" stroke-width="1.5"/>

  <line x1="660" y1="276" x2="700" y2="276" stroke="#6a8a9a" stroke-width="1.5"/>
  <text x="665" y="273" font-size="8" fill="#6a8a9a" font-family="Courier New">RB2 /CS</text>
  <line x1="660" y1="294" x2="700" y2="294" stroke="#6a8a9a" stroke-width="1.5"/>
  <text x="665" y="291" font-size="8" fill="#6a8a9a" font-family="Courier New">RB3 U/D</text>
  <text x="665" y="310" font-size="7" fill="#3a5a6a" font-family="Courier New">← AD5220</text>

  <!-- LED control GPIO -->
  <line x1="660" y1="360" x2="700" y2="360" stroke="#9a7a4a" stroke-width="1.5"/>
  <text x="665" y="357" font-size="8" fill="#9a7a4a" font-family="Courier New">RG2 L-EYE</text>
  <line x1="660" y1="378" x2="700" y2="378" stroke="#9a7a4a" stroke-width="1.5"/>
  <text x="665" y="375" font-size="8" fill="#9a7a4a" font-family="Courier New">RG3 R-EYE</text>
  <text x="665" y="395" font-size="7" fill="#5a4a2a" font-family="Courier New">← LED DRIVER</text>

  <!-- Internal annotations -->
  <text x="395" y="460" font-size="8" fill="#2a4a2a" font-family="Courier New">Timer1 ISR @ 8kHz</text>

  <text x="395" y="490" font-size="8" fill="#2a4a2a" font-family="Courier New">Beat pattern sequencer</text>

  <text x="395" y="569" font-size="7" fill="#1a3a1a" font-family="Courier New">Beat: 4Hz / 8Hz / 2Hz</text>

       BLOCK 3: AUDIO OUTPUT PATH (LEFT CHANNEL)
  ═══════════════════════════════════════════════════════ -->
  <rect x="730" y="90" width="480" height="280" rx="2" fill="#080f10" stroke="#2a5a6a" stroke-width="1.5"/>
  <text x="970" y="107" font-size="9" fill="#6ab0c0" text-anchor="middle" font-family="Courier New" letter-spacing="1">AUDIO OUTPUT PATH (×2 CHANNELS)</text>
  <line x1="730" y1="114" x2="1210" y2="114" stroke="#2a5a6a" stroke-width="0.5"/>

  <!-- ── Left channel signal path ── -->
  <text x="742" y="135" font-size="8" fill="#4a7a8a" font-family="Courier New">LEFT CHANNEL</text>

  <!-- OC1 to R1 -->
  <line x1="700" y1="160" x2="780" y2="160" stroke="#4a9a6a" stroke-width="2"/>

  <!-- R1 10kΩ -->
  <rect x="780" y="152" width="40" height="16" rx="2" fill="#0a1a10" stroke="#3a7a5a" stroke-width="1"/>
  <text x="800" y="163" font-size="8" fill="#4a9a6a" text-anchor="middle" font-family="Courier New">10k</text>

  <line x1="820" y1="160" x2="860" y2="160" stroke="#4a9a6a" stroke-width="1.5"/>
  <!-- C1 10nF to GND -->
  <line x1="840" y1="160" x2="840" y2="186" stroke="#4a9a6a" stroke-width="1.5"/>
  <line x1="834" y1="186" x2="846" y2="186" stroke="#6aaa8a" stroke-width="2"/>
  <line x1="834" y1="191" x2="846" y2="191" stroke="#6aaa8a" stroke-width="2"/>
  <line x1="840" y1="191" x2="840" y2="208" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="849" y="192" font-size="7" fill="#3a6a4a" font-family="Courier New">10nF</text>
  <!-- GND drop -->
  <line x1="840" y1="208" x2="840" y2="215" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="829" y="225" font-size="8" fill="#3a6a3a" font-family="Courier New">⏚</text>

  <!-- R2 10kΩ -->
  <rect x="860" y="152" width="40" height="16" rx="2" fill="#0a1a10" stroke="#3a7a5a" stroke-width="1"/>
  <text x="880" y="163" font-size="8" fill="#4a9a6a" text-anchor="middle" font-family="Courier New">10k</text>
  <line x1="900" y1="160" x2="940" y2="160" stroke="#4a9a6a" stroke-width="1.5"/>
  <!-- C2 10nF to GND -->
  <line x1="920" y1="160" x2="920" y2="186" stroke="#4a9a6a" stroke-width="1.5"/>
  <line x1="914" y1="186" x2="926" y2="186" stroke="#6aaa8a" stroke-width="2"/>
  <line x1="914" y1="191" x2="926" y2="191" stroke="#6aaa8a" stroke-width="2"/>
  <line x1="920" y1="191" x2="920" y2="208" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="929" y="192" font-size="7" fill="#3a6a4a" font-family="Courier New">10nF</text>
  <line x1="920" y1="208" x2="920" y2="215" stroke="#2a4a2a" stroke-width="1.5"/>
  <text x="909" y="225" font-size="8" fill="#3a6a3a" font-family="Courier New">⏚</text>
  <text x="800" y="240" font-size="7" fill="#2a5a4a" text-anchor="middle" font-family="Courier New">2nd-order RC LPF  Fc≈1.6kHz</text>

  <!-- NTE941M Op-Amp (unity gain buffer) -->

  <polygon points="940,145 940,177 980,161" fill="#0c1c14" stroke="#4a8a6a" stroke-width="1.5"/>

  <line x1="940" y1="174" x2="995" y2="174" stroke="#4a9a6a" stroke-width="1.5"/>
  <text x="955" y="143" font-size="7" fill="#3a6a5a" font-family="Courier New">NTE941M</text>
  <text x="955" y="138" font-size="6" fill="#2a4a3a" font-family="Courier New">(unity buffer)</text>
  <!-- VCC/VEE for opamp -->
  <line x1="960" y1="145" x2="960" y2="135" stroke="#a07030" stroke-width="1"/>
  <text x="963" y="133" font-size="6" fill="#a07030" font-family="Courier New">+5V</text>
  <line x1="960" y1="177" x2="960" y2="187" stroke="#2a4a2a" stroke-width="1"/>
  <text x="963" y="196" font-size="6" fill="#3a6a3a" font-family="Courier New">GND</text>

  <!-- Coupling cap C3 10µF -->
  <line x1="995" y1="161" x2="1030" y2="161" stroke="#4a9a6a" stroke-width="1.5"/>

  <text x="1029" y="178" font-size="7" fill="#3a6a4a" font-family="Courier New">10µF</text>
  <text x="1018" y="187" font-size="6" fill="#2a4a3a" font-family="Courier New">(DC block)</text>

  <circle cx="1110" cy="161" r="22" fill="#0c180c" stroke="#4a8a5a" stroke-width="1.5"/>
  <circle cx="1110" cy="161" r="8" fill="#0a120a" stroke="#3a6a3a" stroke-width="1"/>

  <text x="1140" y="151" font-size="7" fill="#4a7a4a" font-family="Courier New">→HEADPHONES</text>
  <!-- Shield/GND -->

  <text x="1099" y="225" font-size="8" fill="#3a6a3a" font-family="Courier New">⏚</text>

  <!-- ── Right channel (mirrored, offset) ── -->
  <text x="742" y="255" font-size="8" fill="#4a7a8a" font-family="Courier New">RIGHT CHANNEL  (identical path — OC2 → R3/C3 → R4/C4 → NTE941M → RING)</text>

  <text x="55" y="500" font-size="7" fill="#3a6a3a" font-family="Courier New">BEAT PATTERN (published by TC):</text>
  <text x="55" y="512" font-size="7" fill="#2a4a2a" font-family="Courier New">• Base: 4Hz (theta) throughout</text>
  <text x="55" y="524" font-size="7" fill="#2a4a2a" font-family="Courier New">• 40s spikes → 8Hz  (every ~8min)</text>
  <text x="55" y="536" font-size="7" fill="#2a4a2a" font-family="Courier New">• 90s dips  → 2Hz  (every ~13min)</text>
  <text x="55" y="548" font-size="7" fill="#2a4a2a" font-family="Courier New">• Smooth 3s ramps on transitions</text>

  <text x="55" y="568" font-size="7" fill="#3a6a3a" font-family="Courier New">LED DRIVER:</text>
  <text x="55" y="580" font-size="7" fill="#2a4a2a" font-family="Courier New">• NTE74HC14: cleans PWM edges</text>
  <text x="55" y="592" font-size="7" fill="#2a4a2a" font-family="Courier New">• Two HC14 stages = non-inverting</text>
  <text x="55" y="604" font-size="7" fill="#2a4a2a" font-family="Courier New">• 2N3904 base: 1kΩ, Ic max 200mA</text>
  <text x="55" y="616" font-size="7" fill="#2a4a2a" font-family="Courier New">• 4 red LEDs/eye, 2S×2P config</text>
  <text x="55" y="628" font-size="7" fill="#2a4a2a" font-family="Courier New">• 33Ω limits to ~30mA total/eye</text>

  <text x="55" y="648" font-size="7" fill="#3a6a3a" font-family="Courier New">AD5220:</text>
  <text x="55" y="660" font-size="7" fill="#2a4a2a" font-family="Courier New">• 64-step SPI digital pot</text>
  <text x="55" y="672" font-size="7" fill="#2a4a2a" font-family="Courier New">• No SPI read — write-only</text>
  <text x="55" y="684" font-size="7" fill="#2a4a2a" font-family="Courier New">• Pulse /CS to step; U/D = dir</text>
  <text x="55" y="696" font-size="7" fill="#2a4a2a" font-family="Courier New">• Reset on power-up = wiper@end</text>
